name: CI

on:
  push:
  pull_request:

jobs:
  backend-test:
    name: Backend Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            BE/requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f "BE/requirements.txt" ]; then
            pip install -r BE/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Import app
        working-directory: BE
        run: python -c "from main import app; print('OK: imported app', type(app))"

      - name: Smoke run + healthcheck
        working-directory: BE
        shell: bash
        run: |
          DEBUG=0 FLASK_DEBUG=0 python main.py &
          pid=$!
          sleep 5
          curl -fsS "http://localhost:5000/health"
          kill $pid || true

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (cache npm)
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: FE/package-lock.json

      - name: Docker build backend
        run: docker build -t memvid-backend -f BE/Dockerfile .

      - name: Docker build frontend
        run: docker build -t memvid-frontend -f FE/Dockerfile .

      - name: Docker compose build
        run: docker compose build

  docker-compose-run-test:
    name: Docker Compose Run Test (optional)
    runs-on: ubuntu-latest
    needs: docker-build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker compose up
        shell: bash
        run: |
          docker compose up -d --build

      - name: Wait backend
        run: sleep 10

      - name: Healthcheck
        run: curl -fsS "http://localhost:5000/health"

      - name: Docker compose logs (on failure)
        if: failure()
        run: docker compose logs --no-color

      - name: Docker compose down
        if: always()
        run: docker compose down -v