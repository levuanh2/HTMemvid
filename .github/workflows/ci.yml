name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-test:
    name: Backend Test (Python 3.11)
    runs-on: ubuntu-latest
    env:
      SKIP_MODEL_LOAD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            BE/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "BE/requirements.txt" ]; then
            pip install -r BE/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Import app
        working-directory: BE
        run: python -c "from app.main import app; print('OK')"

      # OCR-related code paths may expect tesseract on the runner
      - name: Install tesseract (smoke deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr

      - name: Smoke run + healthcheck
        working-directory: BE
        run: |
          DEBUG=0 FLASK_DEBUG=0 python -m app.main &
          pid=$!

          echo "Waiting for backend to be ready..."

          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health > /dev/null; then
              echo "Backend is up!"
              break
            fi
            echo "Retry $i..."
            sleep 2
          done

          echo "Final health check..."
          curl -fsS http://localhost:8080/health

          kill $pid || true

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker build backend
        run: docker build -t memvid-backend -f BE/Dockerfile ./BE

      - name: Docker build frontend
        run: docker build -t memvid-frontend -f FE/Dockerfile .

      - name: Docker compose build
        run: docker compose build

  docker-compose-run-test:
    name: Docker Compose Run Test
    runs-on: ubuntu-latest
    needs: docker-build-test

    steps:
      - uses: actions/checkout@v4

      - name: Docker compose up
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..40}; do
            if curl -fsS http://localhost:8080/health > /dev/null; then
              echo "Backend is up!"
              exit 0
            fi
            echo "Retry $i..."
            sleep 2
          done
          echo "Backend did not become ready in time"
          exit 1

      - name: Healthcheck
        run: curl -fsS http://localhost:8080/health

      - name: Logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Down
        if: always()
        run: docker compose down -v