syntax = "proto3";

package memvid.mindmap;

service MindmapPipeline {
  rpc Skeleton(MindmapInput) returns (SkeletonReply);
  rpc EnrichBranches(EnrichRequest) returns (stream EnrichEvent);
  rpc Relations(RelationsRequest) returns (RelationsReply);
}

message MindmapInput {
  string mm_input_json = 1;
}

message SkeletonReply {
  string nodes_json = 1;
  string method = 2;
}

message EnrichRequest {
  string mm_input_json = 1;
  string skeleton_json = 2;
}

message EnrichEvent {
  int32 progress = 1;
  string message = 2;
  string nodes_json = 3;
  bool degraded = 4;
  bool final = 5;
}

message RelationsRequest {
  string nodes_json = 1;
}

message RelationsReply {
  string relations_json = 1;
  bool degraded = 2;
}
