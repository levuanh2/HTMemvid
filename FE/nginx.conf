server {
  listen 3000;
  server_name _;

  # Allow large uploads through /api/ (default nginx limit is ~1MB)
  client_max_body_size 200M;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip: JS/CSS/JSON/SVG/text (HTML gzip on by default when gzip on)
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_types text/plain text/css text/javascript application/javascript
             application/json application/manifest+json image/svg+xml;

  # Hashed build assets (Vite: /assets/name-<hash>.ext) — immutable, cache 1 năm.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # index.html không hash — luôn revalidate để deploy mới ăn ngay.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 🔥 Proxy API requests to backend container
  location /api/ {
    proxy_pass http://backend:8080/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # 🔥 Increase timeout for long AI processing (LLM/Ollama)
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Optional but useful
    proxy_set_header Connection "";
  }
}

