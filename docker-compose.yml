services:
  backend:
    build:
      context: .
      dockerfile: BE/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./data/videos:/app/videos
      - ./data/index:/app/index
      - ./data/memory:/app/memory
      - ./data/input_docs:/app/input_docs
    environment:
      DATA_DIR: /app
      OLLAMA_HOST: http://host.docker.internal:11434
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: FE/Dockerfile
      args:
        VITE_API_BASE: http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

