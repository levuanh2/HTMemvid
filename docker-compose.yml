services:
  backend:
    build:
      context: ./BE
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data/videos:/app/videos
      - ./data/index:/app/index
      - ./data/memory:/app/memory
      - ./data/input_docs:/app/input_docs
      - hf_cache:/root/.cache/huggingface   # bge-m3 tải 1 lần, dùng lại qua restart
    environment:
      DATA_DIR: /app
      PORT: "8080"
      WEB_CONCURRENCY: "2"
      OLLAMA_HOST: http://host.docker.internal:11434
      SLM_MODEL_CHAT: qwen3.5:9b
      SLM_MODEL: qwen3.5:9b
      MINDMAP_MODEL: qwen3.5:9b
      OLLAMA_REASONING: "0"
      LLM_MAX_TOKENS: "8192"
      HYBRID_TOP_K: "6"
      SESSION_TTL_HOURS: "24"
      SSE_TIMEOUT_SEC: "300"
      ENABLE_QUERY_CITATION_PROMPT: "1"
      USE_LC_VECTOR_STORE: "1"
      USE_LC_QA_CHAIN: "1"
      USE_LC_ENSEMBLE: "1"
      USE_LC_INGEST: "1"
      # Late chunking (mặc định ON): bge-m3 long-context, mean-pool query+chunk cùng encoder.
      EMBEDDING_MODEL_NAME: BAAI/bge-m3
      LATE_CHUNKING: "1"
      HF_HOME: /root/.cache/huggingface
      LLM_GATEWAY_ADDR: llm-gateway:50051
      MINDMAP_SERVICE_ADDR: mindmap-service:50052
      MINDMAP_LLM_TIMEOUT_SEC: "240"   # mirror mindmap-service (dùng khi chạy Local pipeline)
      SUMMARY_LLM_TIMEOUT_SEC: "240"   # summary v2 chạy trong backend (monolith) — cùng lý do CPU chậm
      SUMMARY_PARALLEL: "2"
      # Cache Redis (semantic + retrieval) — fail-open: redis chết thì backend vẫn chạy.
      REDIS_URL: redis://redis:6379/0
      CACHE_ENV: prod
      # Phase 3 single-flight (DR-3 D3) — coalesce duplicate query storms. Host-overridable.
      SINGLE_FLIGHT_ENABLED: "${SINGLE_FLIGHT_ENABLED:-true}"
      SINGLE_FLIGHT_LOCK_TTL_SECONDS: "${SINGLE_FLIGHT_LOCK_TTL_SECONDS:-180}"
      SINGLE_FLIGHT_WAIT_SECONDS: "${SINGLE_FLIGHT_WAIT_SECONDS:-120}"
      SINGLE_FLIGHT_POLL_INTERVAL_SECONDS: "${SINGLE_FLIGHT_POLL_INTERVAL_SECONDS:-0.5}"
      # Phase 4 ingress overload protection — rate limit OFF by default (opt-in for prod).
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-false}"
      RATE_LIMIT_RPS: "${RATE_LIMIT_RPS:-1}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-5}"
      RATE_LIMIT_WINDOW_SECONDS: "${RATE_LIMIT_WINDOW_SECONDS:-60}"
      RATE_LIMIT_SCOPE: "${RATE_LIMIT_SCOPE:-ip}"
      RATE_LIMIT_REQUIRE_REDIS: "${RATE_LIMIT_REQUIRE_REDIS:-false}"
      ADMISSION_RETRY_AFTER_SECONDS: "${ADMISSION_RETRY_AFTER_SECONDS:-5}"
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - llm-gateway
      - mindmap-service
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  llm-gateway:
    build:
      context: ./BE
      dockerfile: Dockerfile
    command: ["python", "-m", "services.llm_gateway.server"]
    expose:
      - "50051"
    volumes:
      - ./data/videos:/app/videos
      - ./data/index:/app/index
      - ./data/memory:/app/memory
      - ./data/input_docs:/app/input_docs
      - hf_cache:/root/.cache/huggingface
    environment:
      DATA_DIR: /app
      OLLAMA_HOST: http://host.docker.internal:11434
      SLM_MODEL_CHAT: qwen3.5:9b
      SLM_MODEL: qwen3.5:9b
      OLLAMA_REASONING: "0"
      LLM_MAX_TOKENS: "8192"
      HYBRID_TOP_K: "6"
      SESSION_TTL_HOURS: "24"
      SSE_TIMEOUT_SEC: "300"
      ENABLE_QUERY_CITATION_PROMPT: "1"
      USE_LC_VECTOR_STORE: "1"
      USE_LC_QA_CHAIN: "1"
      USE_LC_ENSEMBLE: "1"
      USE_LC_INGEST: "1"
      EMBEDDING_MODEL_NAME: BAAI/bge-m3
      LATE_CHUNKING: "1"
      HF_HOME: /root/.cache/huggingface
      LLM_GATEWAY_PORT: "50051"
      # Phase 2: global LLM concurrency cap (DR-3 D2). Host env overrides for tuning:
      #   MAX_CONCURRENT_LLM_CALLS=1 docker compose up -d llm-gateway
      MAX_CONCURRENT_LLM_CALLS: "${MAX_CONCURRENT_LLM_CALLS:-2}"
      LLM_QUEUE_WAIT_TIMEOUT_SECONDS: "${LLM_QUEUE_WAIT_TIMEOUT_SECONDS:-30}"
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mindmap-service:
    build:
      context: ./BE
      dockerfile: Dockerfile
    command: ["python", "-m", "services.mindmap.server"]
    expose:
      - "50052"
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      DATA_DIR: /app
      OLLAMA_HOST: http://host.docker.internal:11434
      SLM_MODEL_CHAT: qwen3.5:9b
      SLM_MODEL: qwen3.5:9b
      MINDMAP_MODEL: qwen3.5:9b
      OLLAMA_REASONING: "0"
      LLM_MAX_TOKENS: "8192"
      HYBRID_TOP_K: "6"
      SESSION_TTL_HOURS: "24"
      SSE_TIMEOUT_SEC: "300"
      ENABLE_QUERY_CITATION_PROMPT: "1"
      USE_LC_VECTOR_STORE: "1"
      USE_LC_QA_CHAIN: "1"
      USE_LC_ENSEMBLE: "1"
      USE_LC_INGEST: "1"
      EMBEDDING_MODEL_NAME: BAAI/bge-m3
      LATE_CHUNKING: "1"
      HF_HOME: /root/.cache/huggingface
      MINDMAP_SERVICE_PORT: "50052"
      # Đo thật 2026-07-05 (qwen3.5:9b, Ollama CPU host): enrich 1 nhánh với prompt
      # nested-detail ~120-160s → default 120s làm 3/4 nhánh degraded. 240s có đệm.
      MINDMAP_LLM_TIMEOUT_SEC: "240"
      # mindmap-service cũng là client của llm-gateway (dùng chung 1 model embedding + policy provider)
      LLM_GATEWAY_ADDR: llm-gateway:50051
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - llm-gateway

  redis:
    image: redis:7-alpine
    # Cache thuần (không persistence): maxmemory nhỏ + allkeys-lru, TTL tự dọn.
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "no", "--save", ""]
    expose:
      - "6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: FE/Dockerfile
      args:
        VITE_API_BASE: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  # Cache HuggingFace dùng chung 3 service (bge-m3 ~2GB tải 1 lần). Muốn tái dùng cache
  # sẵn trên máy thay vì tải lại: đổi thành bind mount host ~/.cache/huggingface.
  hf_cache:
